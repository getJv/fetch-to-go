name: publish-npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/version to publish manually (example: v1.2.3, 1.2.3, or fetch-to-go-v1.2.3).'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve and checkout release tag
        id: resolve_ref
        shell: bash
        run: |
          set -e

          raw_tag='${{ inputs.tag }}'

          pkg_name=$(node -p "require('./package.json').name")
          git fetch --tags --force

          candidates="$raw_tag"
          case "$raw_tag" in
            v*)
              semver_tag="${raw_tag#v}"
              candidates="$candidates\n$semver_tag\n${pkg_name}-$raw_tag\n${pkg_name}-$semver_tag"
              ;;
            *)
              candidates="$candidates\nv$raw_tag\n${pkg_name}-$raw_tag\n${pkg_name}-v$raw_tag"
              ;;
          esac

          resolved=''
          for tag in $(printf '%b\n' "$candidates"); do
            [ -z "$tag" ] && continue
            if git rev-parse -q --verify "refs/tags/$tag" > /dev/null; then
              resolved="$tag"
              break
            fi
          done

          if [ -z "$resolved" ]; then
            echo "Could not find a matching tag for input '$raw_tag'."
            echo "Available recent tags:"
            git tag --sort=-creatordate | head -n 15
            exit 1
          fi

          echo "ref=$resolved" >> "$GITHUB_OUTPUT"
          git checkout "tags/$resolved"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Read package metadata
        id: package
        run: |
          node -e "const fs = require('fs'); const pkg = require('./package.json'); fs.appendFileSync(process.env.GITHUB_OUTPUT, 'name=' + pkg.name + '\nversion=' + pkg.version + '\n');"

      - name: Check if version already exists on npm
        id: npm_check
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version > /dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Version already published, skipping npm publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: ${{ steps.npm_check.outputs.already_published != 'true' }}
        run: npm ci

      - name: Build
        if: ${{ steps.npm_check.outputs.already_published != 'true' }}
        run: npm run build

      - name: Publish to npm
        if: ${{ steps.npm_check.outputs.already_published != 'true' }}
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

